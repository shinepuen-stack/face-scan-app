<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบลงเวลาปฏิบัติงานด้วยใบหน้า (Modern Scan)</title>
  
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --primary: #27ae60; --primary-light: #eafaf1; --secondary: #16a085;
      --success: #2ecc71; --danger: #e74c3c; --warning: #f39c12;
      --bg-body: #f4f6f9; --bg-card: #ffffff; --text-dark: #2c3e50;
      --text-light: #7f8c8d; --shadow-soft: 0 10px 25px rgba(0,0,0,0.05);
      --radius: 12px; --transition: all 0.3s ease;
    }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; padding: 20px; margin: 0; background-color: var(--bg-body); color: var(--text-dark); line-height: 1.6;}
    .container { max-width: 480px; margin: 20px auto 100px auto; background: var(--bg-card); padding: 30px; border-radius: var(--radius); box-shadow: var(--shadow-soft); }
    h2 { color: var(--primary); font-weight: 700; margin-top: 0; }
    
    /* Overlay สำหรับโหลดข้อมูล */
    #loadingOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .nav-tabs { display: flex; gap: 10px; margin-bottom: 25px; background-color: #eee; padding: 5px; border-radius: 50px; }
    .nav-btn { flex: 1; padding: 12px; border: none; cursor: pointer; font-size: 15px; font-weight: 600; border-radius: 50px; background: transparent; color: var(--text-light); transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; }
    .nav-btn.active.scan-page { background-color: var(--primary); color: white; }
    .nav-btn.active.register-page { background-color: var(--secondary); color: white; }
    
    .video-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; border-radius: var(--radius); overflow: hidden; background-color: #000; border: 3px solid #eee; margin-bottom: 15px; }
    .video-wrapper.scanning { border-color: var(--primary); animation: pulse 1.5s infinite; }
    .video-wrapper.success { border-color: var(--success); }
    .video-wrapper.error { border-color: var(--danger); }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(39,174,96,0.4); } 70% { box-shadow: 0 0 0 10px rgba(39,174,96,0); } 100% { box-shadow: 0 0 0 0px rgba(39,174,96,0); } }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    #statusBar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); min-width: 320px; padding: 15px 20px; border-radius: 50px; background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 900; display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; }
    #statusBar.info { color: var(--primary); border: 1px solid var(--primary-light); }
    #statusBar.success { color: var(--success); background: #eafaf1; border: 1px solid #d4efdf; }
    #statusBar.error { color: var(--danger); background: #fdf2f2; border: 1px solid #fadbd8; }
    
    .radio-group input { display: none; }
    .radio-group label { flex: 1; padding: 12px; background: #eee; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: var(--transition); color: var(--text-light); }
    .radio-group label:first-of-type { border-radius: 50px 0 0 50px; }
    .radio-group label:last-of-type { border-radius: 0 50px 50px 0; }
    .radio-group input:checked + label.in { background: var(--success); color: white; }
    .radio-group input:checked + label.out { background: var(--danger); color: white; }
    
    input[type="text"] { padding: 14px 20px; margin: 10px 0; width: 100%; border-radius: 50px; border: 2px solid #eee; box-sizing: border-box; font-size: 15px; }
    input[type="text"]:focus { border-color: var(--primary); outline: none; }
    
    .btn-action { background: var(--secondary); color: white; border: none; padding: 16px; width: 100%; border-radius: 50px; font-weight: 700; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; }
    .btn-action:disabled { background-color: #bdc3c7; cursor: not-allowed; }
    
    /* 🚨 แก้บั๊กหน้าจอโหลดค้างตรงนี้ (ใส่ !important บังคับซ่อน) 🚨 */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div id="loadingText" style="font-weight:600; color:var(--primary);">กำลังโหลดระบบ AI...</div>
    <div id="loadingSubText" style="font-size:12px; color:var(--text-light); margin-top:5px;">โปรดรอสักครู่</div>
  </div>

  <div class="container">
    <h2>Modern Scan</h2>
    <p id="gpsStatus" style="font-size:13px; color:var(--text-light); margin-bottom:20px;"><i class="fa-solid fa-location-dot"></i> กำลังค้นหาตำแหน่ง GPS...</p>

    <div id="navMenu" class="nav-tabs hidden">
      <button id="navScan" class="nav-btn scan-page active" onclick="showPage('scanPage')"><i class="fa-solid fa-clock"></i> ลงเวลา</button>
      <button id="navReg" class="nav-btn register-page" onclick="showPage('registerPage')"><i class="fa-solid fa-user-plus"></i> ลงทะเบียน</button>
    </div>

    <div id="scanPage" class="hidden">
      <div class="radio-group nav-tabs">
        <input type="radio" id="typeIn" name="scanType" value="in" checked>
        <label for="typeIn" class="in"><i class="fa-solid fa-sign-in-alt"></i> เข้างาน</label>
        <input type="radio" id="typeOut" name="scanType" value="out">
        <label for="typeOut" class="out"><i class="fa-solid fa-sign-out-alt"></i> ออกงาน</label>
      </div>
      <div class="video-wrapper" id="scanVideoWrapper"><video id="scanVideo" autoplay muted playsinline></video></div>
    </div>

    <div id="registerPage" class="hidden">
      <input type="text" id="regName" placeholder="ชื่อ-นามสกุล">
      <input type="text" id="regPos" placeholder="ตำแหน่ง">
      <div class="video-wrapper"><video id="regVideo" autoplay muted playsinline></video></div>
      <button id="btnRegister" class="btn-action" onclick="registerFace()"><i class="fa-solid fa-camera"></i> บันทึกใบหน้า</button>
    </div>
  </div>

  <div id="statusBar" class="info hidden">
    <i id="statusIcon" class="fa-solid fa-circle-info"></i>
    <span id="statusText">กำลังเตรียมความพร้อม...</span>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxlbrOH_09Gs_hXkHWa_OYHjKQHjqTis8-8NebNRnAV_bFfvPNJ5WS4tuThDMBvMBTS/exec';
    const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';

    let labeledFaceDescriptors = [], isScanning = false, stream = null, currentLat = '', currentLng = '';

    window.onload = async () => {
      const loadText = document.getElementById('loadingText');
      const subText = document.getElementById('loadingSubText');
      
      try {
        loadText.innerText = "กำลังโหลดโมเดล AI (1/3)...";
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        
        loadText.innerText = "กำลังโหลดโมเดล AI (2/3)...";
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        
        loadText.innerText = "กำลังโหลดโมเดล AI (3/3)...";
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        
        loadText.innerText = "โหลด AI สำเร็จ! กำลังเตรียมระบบ...";
        subText.innerText = "";
        startApp();
      } catch (err) {
        document.getElementById('loadingOverlay').innerHTML = `<i class="fa-solid fa-times-circle" style="font-size:40px; color:var(--danger); margin-bottom:20px;"></i><div style="color:var(--danger); font-weight:600;">โหลด AI ล้มเหลว</div><div style="font-size:12px; color:var(--text-light); margin-top:5px;">โปรดเช็คอินเทอร์เน็ตแล้วกด F5</div>`;
        console.error("Model Load Error:", err);
      }
    };

    async function startApp() {
      // ซ่อน Overlay (ตอนนี้ซ่อนได้แน่นอนแล้วเพราะมี !important)
      document.getElementById('loadingOverlay').classList.add('hidden');
      setStatus("loading", "กำลังดึงข้อมูลพนักงานจากระบบ...");
      
      try {
        const res = await fetch(GAS_URL + "?action=getFaces");
        const data = await res.json();
        
        if (data && data.length > 0) {
          labeledFaceDescriptors = data.map(u => new faceapi.LabeledFaceDescriptors(u.name, [new Float32Array(JSON.parse(u.descriptor))]));
          setStatus("success", "ระบบพร้อมใช้งาน!");
          showPage('scanPage');
        } else {
          setStatus("info", "เชื่อมต่อสำเร็จ แต่ยังไม่มีข้อมูลพนักงาน โปรดลงทะเบียน");
          showPage('registerPage');
        }
        document.getElementById('navMenu').classList.remove('hidden');
        getLocation();
      } catch (e) { 
        setStatus("error", "เชื่อมต่อฐานข้อมูลล้มเหลว (เช็คสิทธิ์ Anyone)"); 
        console.error("GAS Error:", e);
      }
    }

    function showPage(pageId) {
      isScanning = false;
      document.getElementById('scanPage').classList.add('hidden');
      document.getElementById('registerPage').classList.add('hidden');
      document.getElementById(pageId).classList.remove('hidden');
      
      document.getElementById('navScan').classList.toggle('active', pageId === 'scanPage');
      document.getElementById('navReg').classList.toggle('active', pageId === 'registerPage');
      
      startCamera(pageId === 'scanPage' ? 'scanVideo' : 'regVideo');
      if (pageId === 'scanPage') { isScanning = true; recognizeFaces(); }
    }

    async function startCamera(id) {
      if (stream) stream.getTracks().forEach(t => t.stop());
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        document.getElementById(id).srcObject = stream;
      } catch (e) {
        setStatus("error", "ไม่สามารถเปิดกล้องได้ โปรดอนุญาตการเข้าถึงกล้อง");
        console.error("Camera Error:", e);
      }
    }

    function getLocation() {
      navigator.geolocation.getCurrentPosition(
        p => {
          currentLat = p.coords.latitude; currentLng = p.coords.longitude;
          document.getElementById('gpsStatus').innerHTML = '<i class="fa-solid fa-location-dot" style="color:var(--primary)"></i> ดึงพิกัด GPS สำเร็จ';
        },
        e => {
          document.getElementById('gpsStatus').innerHTML = '<i class="fa-solid fa-exclamation-triangle" style="color:var(--warning)"></i> โปรดเปิด GPS (Location)';
        }
      );
    }

    async function registerFace() {
      const name = document.getElementById('regName').value.trim();
      const pos = document.getElementById('regPos').value.trim();
      if (!name || !pos) { alert("กรุณากรอกชื่อและตำแหน่งให้ครบ"); return; }
      
      const btn = document.getElementById('btnRegister');
      btn.disabled = true;
      setStatus("loading", "กำลังวิเคราะห์ใบหน้า...");
      
      const videoEl = document.getElementById('regVideo');
      const detection = await faceapi.detectSingleFace(videoEl, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
      
      if (!detection) { 
        setStatus("error", "ไม่พบใบหน้า กรุณาให้หน้าชัดเจนแล้วกดบันทึกใหม่"); 
        btn.disabled = false; return; 
      }
      
      setStatus("loading", "กำลังส่งข้อมูลลงทะเบียน...");
      const canvas = document.createElement('canvas');
      canvas.width = videoEl.videoWidth; canvas.height = videoEl.videoHeight;
      canvas.getContext('2d').drawImage(videoEl, 0, 0);
      
      const payload = { 
        action: 'register', 
        name: name, 
        position: pos, 
        descriptorStr: JSON.stringify(Array.from(detection.descriptor)), 
        imageBase64: canvas.toDataURL('image/jpeg', 0.5) 
      };
      
      try {
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        alert(result.message); 
        location.reload();
      } catch (e) {
        setStatus("error", "เกิดข้อผิดพลาดในการลงทะเบียน");
        btn.disabled = false;
      }
    }

    function checkTimeCondition(type) {
      const h = new Date().getHours(), m = new Date().getMinutes();
      if (type === 'in') {
        if (h < 8) return { status: 'ปกติ', reason: '-' };
        if (h === 8 && m <= 15) return { status: 'สาย', reason: '-' };
        return { status: 'ขาดงาน', reason: '-' }; 
      } else {
        if (h >= 16) return { status: 'ปกติ', reason: '-' };
        const reason = prompt("แจ้งเตือน: คุณกำลังออกงานก่อน 16:00 น.\nกรุณาระบุเหตุผล:");
        return (!reason || reason.trim() === "") ? null : { status: 'ออกก่อนเวลา', reason: reason };
      }
    }

    async function recognizeFaces() {
      const video = document.getElementById('scanVideo');
      const wrapper = document.getElementById('scanVideoWrapper');
      if (!isScanning || labeledFaceDescriptors.length === 0) return;
      
      const faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.6);
      
      const interval = setInterval(async () => {
        if (!isScanning) return clearInterval(interval);
        wrapper.classList.add('scanning');
        
        const det = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
        
        if (det) {
          const match = faceMatcher.findBestMatch(det.descriptor);
          if (match.label !== 'unknown') {
            isScanning = false; clearInterval(interval);
            wrapper.classList.remove('scanning');
            wrapper.classList.add('success');
            
            const type = document.querySelector('input[name="scanType"]:checked').value;
            const timeCheck = checkTimeCondition(type);
            
            if (!timeCheck) {
               setStatus("error", "❌ ยกเลิก: ไม่ได้ระบุเหตุผล");
               wrapper.classList.remove('success');
               setTimeout(() => { isScanning = true; recognizeFaces(); }, 3000); return;
            }

            setStatus("loading", `กำลังบันทึกเวลาให้: ${match.label}...`);
            
            try {
              const res = await fetch(GAS_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                  action: 'attendance', 
                  name: match.label, 
                  typeStr: type === 'in' ? 'เข้า' : 'ออก', 
                  statusStr: timeCheck.status, 
                  reasonStr: timeCheck.reason, 
                  lat: currentLat, 
                  lng: currentLng 
                }) 
              });
              const result = await res.json();
              alert(result.message); 
              wrapper.classList.remove('success');
              setTimeout(() => { isScanning = true; recognizeFaces(); }, 3000);
            } catch (e) {
              setStatus("error", "บันทึกเวลาล้มเหลว");
              wrapper.classList.remove('success');
              setTimeout(() => { isScanning = true; recognizeFaces(); }, 3000);
            }
          } else {
            wrapper.classList.remove('scanning');
            wrapper.classList.add('error');
            setTimeout(() => wrapper.classList.remove('error'), 500);
          }
        } else {
          wrapper.classList.remove('scanning');
        }
      }, 1000);
    }

    function setStatus(type, msg) {
      const bar = document.getElementById('statusBar');
      const icon = document.getElementById('statusIcon');
      bar.className = 'info ' + (type === 'loading' ? 'info' : type);
      
      const icons = {
        info: 'fa-solid fa-circle-info', success: 'fa-solid fa-check-circle',
        error: 'fa-solid fa-times-circle', loading: 'fa-solid fa-spinner fa-spin'
      };
      icon.className = icons[type];
      document.getElementById('statusText').innerText = msg;
      bar.classList.remove('hidden');
    }
  </script>
</body>
</html>
